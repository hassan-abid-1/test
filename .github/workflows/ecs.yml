name: Push image to ECR
on:
  push:
    branches:
      - dev

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: test-ph
  ECS_SERVICE: test-my
  ECS_CLUSTER: test
  CONTAINER_NAME: test
  TASK_DEFINITION: ./.aws/task-definition-prd.json  


permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
            aws-access-key-id: "AKIA2NYRDK7RFWFHATTH"
            aws-secret-access-key: "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"
            aws-region: ${{ env.AWS_REGION }}
            
    #   - name: Get commit ID
    #     id: commit_id
    #     run: echo ::set-output name=commit_id::${GITHUB_SHA::7}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest1
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      # - name: Download task definition
      #   run: |
      #     aws ecs describe-task-definition --task-definition ${{env.TASK_DEFINITION}} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@c804dfbdd57f713b6c079302a4c01db7017a36fc
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@df9643053eda01f169e64a0e60233aacca83799a
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
